name: Sync Fork

on:
  workflow_dispatch:
  schedule:
    - cron: '49 * * * *'

permissions:
  contents: write

concurrency:
  group: sync-fork-${{ github.ref }}
  cancel-in-progress: false

env:
  UPSTREAM_REPO: SeerAPI/seer-unity-assets
  UPSTREAM_BRANCH: main
  GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream while preserving fork workflows
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --depth=1 --filter=blob:none origin "${UPSTREAM_BRANCH}:refs/remotes/origin/${UPSTREAM_BRANCH}"
          git fetch --depth=1 --filter=blob:none upstream "${UPSTREAM_BRANCH}:refs/remotes/upstream/${UPSTREAM_BRANCH}"
          current_commit="$(git rev-parse "refs/remotes/origin/${UPSTREAM_BRANCH}")"
          upstream_commit="$(git rev-parse "refs/remotes/upstream/${UPSTREAM_BRANCH}")"

          git read-tree "${upstream_commit}^{tree}"
          if git ls-files '.github/workflows/*' --error-unmatch >/dev/null 2>&1; then
            git ls-files -z '.github/workflows/*' | xargs -0 -r git update-index --force-remove --
          fi
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            mode="$(git ls-tree "${current_commit}" "$path" | awk '{print $1}')"
            blob="$(git rev-parse "${current_commit}:${path}")"
            git update-index --add --cacheinfo "${mode}" "${blob}" "$path"
          done < <(git ls-tree -r --name-only "${current_commit}" .github/workflows || true)

          new_tree="$(git write-tree)"
          current_tree="$(git show -s --format=%T "${current_commit}")"
          if [ "${new_tree}" = "${current_tree}" ]; then
            echo "Already up to date."
            exit 0
          fi
          new_commit="$(printf 'chore: sync upstream\n' | git commit-tree "${new_tree}" -p "${current_commit}")"
          git push origin "${new_commit}:refs/heads/${UPSTREAM_BRANCH}"